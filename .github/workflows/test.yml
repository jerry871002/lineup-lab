name: Test services and report coverage

on:
  push:
    branches: ["main"]
    paths:
      - "auth/**"
      - "frontend/**"
      - "postgres/**"
      - "simulation/**"
      - "stats/**"
      - ".github/workflows/test.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "auth/**"
      - "frontend/**"
      - "postgres/**"
      - "simulation/**"
      - "stats/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

jobs:
  postgres-schema-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.4
        env:
          POSTGRES_DB: lineup_lab_test
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lineup_lab_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Verify users.updated_at trigger
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
        run: bash postgres/tests/users_updated_at_trigger.sh

  auth-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: auth/requirements.txt

      - name: Install dependencies
        run: pip install -r auth/requirements.txt

      - name: Run auth tests
        run: PYTHONPATH=auth pytest auth/tests -q

  go-coverage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - simulation
          - stats

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run Go tests with coverage
        working-directory: ${{ matrix.module }}
        run: |
          go test ./... -coverprofile=coverage.out
          go tool cover -func=coverage.out | tee coverage.txt

      - name: Add coverage summary
        working-directory: ${{ matrix.module }}
        run: |
          total="$(grep '^total:' coverage.txt | awk '{print $3}')"
          {
            echo "### ${{ matrix.module }} coverage"
            echo
            echo "- total: ${total}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module }}-coverage
          path: |
            ${{ matrix.module }}/coverage.out
            ${{ matrix.module }}/coverage.txt

  frontend-coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Add frontend coverage summary
        working-directory: frontend
        run: |
          total="$(node -e "const fs=require('fs'); const summary=JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8')); console.log(summary.total.lines.pct + '%')")"
          {
            echo "### frontend coverage"
            echo
            echo "- total lines: ${total}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload frontend coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: |
            frontend/coverage
