name: Validate Compose config

on:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/compose-config.yml"
      - "docker-compose.yml"
      - ".env.example"
      - "gateway/**"
      - "frontend/**"
      - "game-simulation/**"
      - "stat-api-server/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - ".github/workflows/compose-config.yml"
      - "docker-compose.yml"
      - ".env.example"
      - "gateway/**"
      - "frontend/**"
      - "game-simulation/**"
      - "stat-api-server/**"
  workflow_dispatch:

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    env:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: change-me
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: change-me
    steps:
      - uses: actions/checkout@v5

      - name: Render default Compose config
        run: |
          STAT_API_SERVER_DATABASE_URL=postgres://myuser:change-me@db/mydatabase?sslmode=disable \
          docker compose config --format json > compose-default.json

      - name: Verify default frontend API entrypoint and port mappings
        run: |
          python3 - <<'PY'
          import json

          with open("compose-default.json", "r", encoding="utf-8") as f:
              compose = json.load(f)

          services = compose["services"]
          gateway_service = services["gateway"]
          db_service = services["db"]
          pgadmin_service = services["pgadmin"]
          stat_service = services["stat-api-server"]
          gateway_port = gateway_service["ports"][0]
          stat_port = services["stat-api-server"]["ports"][0]
          simulation_port = services["game-simulation"]["ports"][0]

          assert gateway_service["build"]["context"].endswith("lineup-lab")
          assert gateway_service["build"]["dockerfile"] == "gateway/Dockerfile"
          assert db_service["environment"]["POSTGRES_DB"] == "mydatabase"
          assert db_service["environment"]["POSTGRES_USER"] == "myuser"
          assert db_service["environment"]["POSTGRES_PASSWORD"] == "change-me"
          assert pgadmin_service["environment"]["PGADMIN_DEFAULT_EMAIL"] == "admin@admin.com"
          assert pgadmin_service["environment"]["PGADMIN_DEFAULT_PASSWORD"] == "change-me"
          assert stat_service["environment"]["DATABASE_URL"] == "postgres://myuser:change-me@db/mydatabase?sslmode=disable"
          assert gateway_port["published"] == "8080"
          assert gateway_port["target"] == 80
          assert stat_port["published"] == "8082"
          assert stat_port["target"] == 80
          assert simulation_port["published"] == "8081"
          assert simulation_port["target"] == 80
          PY

      - name: Render Compose config with overridden service ports
        run: |
          STAT_API_SERVER_DATABASE_URL=postgres://myuser:change-me@db/mydatabase?sslmode=disable \
          STAT_API_SERVER_PORT=18080 \
          STAT_API_SERVER_HOST_PORT=19082 \
          GAME_SIMULATION_PORT=18081 \
          GAME_SIMULATION_HOST_PORT=19081 \
          docker compose config --format json > compose-overrides.json

      - name: Verify overridden internal service ports and frontend entrypoint
        run: |
          python3 - <<'PY'
          import json

          with open("compose-overrides.json", "r", encoding="utf-8") as f:
              compose = json.load(f)

          services = compose["services"]
          gateway_service = services["gateway"]
          db_service = services["db"]
          pgadmin_service = services["pgadmin"]
          stat_service = services["stat-api-server"]
          simulation_service = services["game-simulation"]
          gateway_port = gateway_service["ports"][0]
          stat_port = stat_service["ports"][0]
          simulation_port = simulation_service["ports"][0]

          assert gateway_service["build"]["context"].endswith("lineup-lab")
          assert gateway_service["build"]["dockerfile"] == "gateway/Dockerfile"
          assert db_service["environment"]["POSTGRES_DB"] == "mydatabase"
          assert db_service["environment"]["POSTGRES_USER"] == "myuser"
          assert db_service["environment"]["POSTGRES_PASSWORD"] == "change-me"
          assert pgadmin_service["environment"]["PGADMIN_DEFAULT_EMAIL"] == "admin@admin.com"
          assert pgadmin_service["environment"]["PGADMIN_DEFAULT_PASSWORD"] == "change-me"
          assert gateway_port["published"] == "8080"
          assert gateway_port["target"] == 80
          assert stat_service["environment"]["PORT"] == "18080"
          assert stat_service["environment"]["DATABASE_URL"] == "postgres://myuser:change-me@db/mydatabase?sslmode=disable"
          assert stat_port["published"] == "19082"
          assert stat_port["target"] == 18080
          assert simulation_service["environment"]["PORT"] == "18081"
          assert simulation_port["published"] == "19081"
          assert simulation_port["target"] == 18081
          PY

      - name: Verify missing required env fails fast
        run: |
          if docker compose config >/tmp/compose-missing-env.log 2>&1; then
            echo "docker compose config unexpectedly succeeded without required env vars"
            exit 1
          fi

          grep -F "STAT_API_SERVER_DATABASE_URL must be set" /tmp/compose-missing-env.log

  gateway-smoke-test:
    runs-on: ubuntu-latest
    env:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: change-me
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: change-me
      STAT_API_SERVER_DATABASE_URL: postgres://myuser:change-me@db/mydatabase?sslmode=disable
      GAME_SIMULATION_DEBUG: "1"
    steps:
      - uses: actions/checkout@v5

      - name: Start Docker Compose stack
        run: docker compose up -d --build

      - name: Wait for gateway frontend response
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://localhost:8080/ > gateway-root.html; then
              exit 0
            fi

            sleep 2
          done

          echo "Gateway did not start serving the frontend in time"
          docker compose logs --no-color
          exit 1

      - name: Verify gateway serves the frontend
        run: |
          grep -F "<title>Lineup Lab</title>" gateway-root.html

      - name: Wait for proxied teams endpoint
        run: |
          for attempt in $(seq 1 30); do
            status="$(curl -s -o teams.json -w '%{http_code}' http://localhost:8080/api/teams)"
            if [ "$status" = "200" ]; then
              exit 0
            fi

            sleep 2
          done

          echo "Gateway did not proxy /api/teams successfully in time"
          docker compose logs --no-color
          exit 1

      - name: Verify teams response is valid JSON
        run: |
          python3 - <<'PY'
          import json

          with open("teams.json", "r", encoding="utf-8") as f:
              payload = json.load(f)

          assert isinstance(payload, list), payload
          PY

      - name: Verify unknown API path returns 404 instead of frontend HTML
        run: |
          status="$(curl -s -o api-not-found.txt -w '%{http_code}' http://localhost:8080/api/not-found)"
          test "$status" = "404"
          if grep -Fq "<title>Lineup Lab</title>" api-not-found.txt; then
            echo "Unknown API path returned frontend HTML"
            exit 1
          fi

      - name: Tear down Docker Compose stack
        if: always()
        run: docker compose down -v
