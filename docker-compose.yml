services:
  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_STAT_API_BASE_URL: ${REACT_APP_STAT_API_BASE_URL:-http://localhost:8082}
        REACT_APP_SIMULATION_API_BASE_URL: ${REACT_APP_SIMULATION_API_BASE_URL:-http://localhost:8081}
    ports:
      - 8080:80
    depends_on:
      - db

  game-simulation:
    build: ./game-simulation
    environment:
      PORT: ${GAME_SIMULATION_PORT:-80}
      ALLOWED_ORIGIN: ${GAME_SIMULATION_ALLOWED_ORIGIN:-*}
      DEBUG: ${GAME_SIMULATION_DEBUG:-}
    ports:
      - 8081:80
    depends_on:
      - db

  stat-api-server:
    build: ./stat-api-server
    environment:
      PORT: ${STAT_API_SERVER_PORT:-80}
      DATABASE_URL: ${STAT_API_SERVER_DATABASE_URL:-postgres://myuser:mypassword@db/mydatabase?sslmode=disable}
      ALLOWED_ORIGIN: ${STAT_API_SERVER_ALLOWED_ORIGIN:-*}
    ports:
      - 8082:80
    depends_on:
      - db

  db:
    build: ./stat-db
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - 5432:5432
    volumes:
      - db-data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - 8083:80
    depends_on:
      - db

volumes:
  db-data:
