services:
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      STATS_PORT: ${STATS_PORT:-80}
      SIMULATION_PORT: ${SIMULATION_PORT:-80}
    ports:
      - 8080:80
    depends_on:
      - stats
      - simulation

  simulation:
    build: ./simulation
    environment:
      PORT: ${SIMULATION_PORT:-80}
      ALLOWED_ORIGIN: ${SIMULATION_ALLOWED_ORIGIN:-*}
      DEBUG: ${SIMULATION_DEBUG:-}
    ports:
      - 127.0.0.1:${SIMULATION_HOST_PORT:-8081}:${SIMULATION_PORT:-80}
    depends_on:
      - postgres

  stats:
    build: ./stats
    environment:
      PORT: ${STATS_PORT:-80}
      DATABASE_URL: ${STATS_DATABASE_URL:?STATS_DATABASE_URL must be set}
      ALLOWED_ORIGIN: ${STATS_ALLOWED_ORIGIN:-*}
    ports:
      - 127.0.0.1:${STATS_HOST_PORT:-8082}:${STATS_PORT:-80}
    depends_on:
      - postgres

  postgres:
    build: ./postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - 5432:5432
    volumes:
      - db-data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?PGADMIN_DEFAULT_EMAIL must be set}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD must be set}
    ports:
      - 8083:80
    depends_on:
      - postgres

volumes:
  db-data:
