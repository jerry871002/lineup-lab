services:
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      STAT_API_SERVER_PORT: ${STAT_API_SERVER_PORT:-80}
      GAME_SIMULATION_PORT: ${GAME_SIMULATION_PORT:-80}
    ports:
      - 8080:80
    depends_on:
      - stat-api-server
      - game-simulation

  game-simulation:
    build: ./game-simulation
    environment:
      PORT: ${GAME_SIMULATION_PORT:-80}
      ALLOWED_ORIGIN: ${GAME_SIMULATION_ALLOWED_ORIGIN:-*}
      DEBUG: ${GAME_SIMULATION_DEBUG:-}
    ports:
      - 127.0.0.1:${GAME_SIMULATION_HOST_PORT:-8081}:${GAME_SIMULATION_PORT:-80}
    depends_on:
      - db

  stat-api-server:
    build: ./stat-api-server
    environment:
      PORT: ${STAT_API_SERVER_PORT:-80}
      DATABASE_URL: ${STAT_API_SERVER_DATABASE_URL:?STAT_API_SERVER_DATABASE_URL must be set}
      ALLOWED_ORIGIN: ${STAT_API_SERVER_ALLOWED_ORIGIN:-*}
    ports:
      - 127.0.0.1:${STAT_API_SERVER_HOST_PORT:-8082}:${STAT_API_SERVER_PORT:-80}
    depends_on:
      - db

  db:
    build: ./stat-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - 5432:5432
    volumes:
      - db-data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?PGADMIN_DEFAULT_EMAIL must be set}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD must be set}
    ports:
      - 8083:80
    depends_on:
      - db

volumes:
  db-data:
